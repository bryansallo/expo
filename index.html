<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Modelado 3D — Casos Reales</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap');
  :root {
    --bg:     #070b12;
    --card:   #0d1520;
    --border: #1a2840;
    --accent: #3b82f6;
    --text:   #e2eaf5;
    --muted:  #4a6080;
    --mono:   'IBM Plex Mono', monospace;
    --sans:   'Space Grotesk', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }
  header {
    padding: 24px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    gap: 16px;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  header span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  nav {
    display: flex;
    gap: 4px;
    padding: 16px 40px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  nav::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 18px 10px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--mono);
    letter-spacing: 0.5px;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    outline: none;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  main {
    display: grid;
    grid-template-columns: 1fr 380px;
    height: calc(100vh - 109px);
  }
  #canvas-wrap {
    position: relative;
    background: #040810;
  }
  #canvas-wrap canvas { display: block; }
  aside {
    background: var(--card);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .case-info {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  .case-sector {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .case-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }
  .case-desc {
    font-size: 13px;
    color: #8aaccc;
    line-height: 1.6;
  }
  .ps-block {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .ps-row { display: flex; gap: 10px; align-items: flex-start; }
  .ps-badge {
    font-family: var(--mono);
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 1px;
    padding: 2px 7px;
    border-radius: 2px;
    white-space: nowrap;
    margin-top: 2px;
  }
  .ps-badge.problem  { background: rgba(239,68,68,.15); color: #ef4444; }
  .ps-badge.solution { background: rgba(34,197,94,.15);  color: #22c55e; }
  .ps-text { font-size: 12px; color: #8aaccc; line-height: 1.55; }
  .code-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
  }
  .code-wrap::-webkit-scrollbar { width: 3px; }
  .code-wrap::-webkit-scrollbar-thumb { background: var(--border); }
  .code-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  pre {
    background: #040810;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 14px;
    font-family: var(--mono);
    font-size: 11.5px;
    line-height: 1.75;
    overflow-x: auto;
    white-space: pre;
  }
  .ck { color: #7aa2f7; }
  .cv { color: #9ece6a; }
  .cs { color: #e0af68; }
  .cc { color: #3d5a7a; }
  .cn { color: #ff9e64; }
  #scene-label {
    position: absolute;
    top: 14px; left: 14px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    pointer-events: none;
  }
  #scene-label strong { color: var(--accent); }
  #game-hud {
    display: none;
    position: absolute;
    top: 14px; right: 14px;
    background: rgba(4, 8, 16, 0.85);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    min-width: 180px;
    pointer-events: none;
  }
  #game-hud .hud-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 6px;
  }
  #game-hud .hud-label { color: var(--muted); }
  #game-hud .hud-val   { color: #ffdd44; font-weight: 600; }
  #game-hud .hud-val.hit { color: #ef4444; }
  .health-bar-bg {
    height: 6px;
    background: #1a2840;
    border-radius: 3px;
    margin-top: 4px;
    overflow: hidden;
  }
  .health-bar-fill {
    height: 100%;
    width: 80%;
    background: linear-gradient(90deg, #22c55e, #86efac);
    border-radius: 3px;
    transition: width 0.3s;
  }
  #hitbox-legend {
    display: none;
    position: absolute;
    bottom: 16px; left: 14px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    pointer-events: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  #hitbox-legend .leg-row { display: flex; align-items: center; gap: 8px; }
  #hitbox-legend .leg-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <h1>Modelado 3D — Casos Reales</h1>
  <span>Three.js · WebGL · sin instalación</span>
</header>

<nav id="tabs"></nav>

<main>
  <div id="canvas-wrap">
    <div id="scene-label">ESCENA ACTIVA: <strong id="lbl-scene">—</strong></div>

    <div id="game-hud">
      <div class="hud-row">
        <span class="hud-label">PUNTUACIÓN</span>
        <span class="hud-val" id="hud-score">0</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">VIDA</span>
        <span class="hud-val" id="hud-hp">100</span>
      </div>
      <div class="health-bar-bg">
        <div class="health-bar-fill" id="hud-bar"></div>
      </div>
      <div class="hud-row" style="margin-top:8px;">
        <span class="hud-label">ESTADO</span>
        <span class="hud-val" id="hud-status">EN SUELO</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">COLISIÓN</span>
        <span class="hud-val" id="hud-hit">NO</span>
      </div>
      <div style="margin-top:10px; border-top:1px solid #1a2840; padding-top:8px; color:#4a6080; font-size:10px; line-height:1.8;">
        WASD / flechas · mover<br>
        ESPACIO · saltar
      </div>
    </div>

    <div id="hitbox-legend">
      <div class="leg-row">
        <div class="leg-dot" style="background:#3b82f6;"></div>
        <span>Personaje (cápsula)</span>
      </div>
      <div class="leg-row">
        <div class="leg-dot" style="background:#ff3333; opacity:0.6;"></div>
        <span>Hitbox (wireframe)</span>
      </div>
      <div class="leg-row">
        <div class="leg-dot" style="background:#ffdd00;"></div>
        <span>Proyectil</span>
      </div>
      <div class="leg-row">
        <div class="leg-dot" style="background:#22c55e;"></div>
        <span>Enemigo</span>
      </div>
    </div>
  </div>

  <aside>
    <div class="case-info">
      <div class="case-sector" id="info-sector"></div>
      <div class="case-title"  id="info-title"></div>
      <div class="case-desc"   id="info-desc"></div>
    </div>
    <div class="ps-block">
      <div class="ps-row">
        <span class="ps-badge problem">PROBLEMA</span>
        <span class="ps-text" id="info-problem"></span>
      </div>
      <div class="ps-row">
        <span class="ps-badge solution">SOLUCIÓN 3D</span>
        <span class="ps-text" id="info-solution"></span>
      </div>
    </div>
    <div class="code-wrap">
      <div class="code-label">// CÓDIGO THREE.JS</div>
      <pre id="code-block"></pre>
    </div>
  </aside>
</main>

<!-- ─── Casos externos (deben cargarse antes del módulo principal) ─── -->
<script src="caso_videojuegos.js"></script>
<script src="caso_salud.js"></script>
<script src="caso_arquitectura.js"></script>
<script src="caso_medicina.js"></script>
<script src="caso_educacion.js"></script>
<script src="caso_ingenieria.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';


const CASOS = [
  casoVideojuegos,
  casoSalud,
  casoArquitectura,
  casoMedicina,
  casoEducacion,
  casoIngenieria,
];


// ═══════════════════════════════════════════════════════════════
//  ESTRUCTURA BÁSICA DE THREE.JS
// ═══════════════════════════════════════════════════════════════

const wrap = document.getElementById('canvas-wrap');

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, wrap.clientWidth / wrap.clientHeight, 0.1, 200);
camera.position.set(0, 3, 7);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(wrap.clientWidth, wrap.clientHeight);
renderer.shadowMap.enabled = true;
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.minDistance = 2;
controls.maxDistance = 20;

window.addEventListener('resize', () => {
  camera.aspect = wrap.clientWidth / wrap.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
});


// ═══════════════════════════════════════════════════════════════
//  FUNCIONES AUXILIARES
// ═══════════════════════════════════════════════════════════════

function addFloor(scene, color = 0x0d1520) {
  const suelo = new THREE.Mesh(
    new THREE.PlaneGeometry(30, 30),
    new THREE.MeshStandardMaterial({ color, roughness: 1 })
  );
  suelo.rotation.x = -Math.PI / 2;
  suelo.position.y = -1.6;
  suelo.receiveShadow = true;
  scene.add(suelo);
}

function addLights(scene, color = 0xffffff) {
  scene.add(new THREE.AmbientLight(color, 0.4));
  const dirLight = new THREE.DirectionalLight(color, 1);
  dirLight.position.set(5, 10, 7.5);
  dirLight.castShadow = true;
  scene.add(dirLight);
}

// Exponer funciones globalmente para que los casos externos puedan usarlas
window.addFloor  = addFloor;
window.addLights = addLights;
window.THREE     = THREE;


// ═══════════════════════════════════════════════════════════════
//  GESTIÓN DE CASOS
// ═══════════════════════════════════════════════════════════════

let activeObj  = null;
let activeCaso = null;

function clearScene() {
  while (scene.children.length) scene.remove(scene.children[0]);
}

function loadCaso(idx) {
  clearScene();
  const c = CASOS[idx];
  activeCaso = c;

  const fondos = {
    'Videojuegos': 0x040810, 'Salud': 0x060810,
    'Arquitectura': 0x08070a, 'Medicina': 0x04100a,
    'Educación': 0x02030f, 'Ingeniería': 0x090800,
  };
  scene.background = new THREE.Color(fondos[c.sector] || 0x070b12);
  scene.fog = new THREE.Fog(fondos[c.sector] || 0x070b12, 14, 35);

  activeObj = c.build(scene);

  camera.position.set(0, 3, 7);
  controls.target.set(0, 0.5, 0);
  controls.update();

  document.getElementById('info-sector').textContent   = c.sector.toUpperCase();
  document.getElementById('info-title').textContent    = c.title;
  document.getElementById('info-desc').textContent     = c.desc;
  document.getElementById('info-problem').textContent  = c.problem;
  document.getElementById('info-solution').textContent = c.solution;
  document.getElementById('code-block').innerHTML      = c.code;
  document.getElementById('lbl-scene').textContent     = c.sector;

  const esJuego = c.sector === 'Videojuegos';
  document.getElementById('game-hud').style.display      = esJuego ? 'block' : 'none';
  document.getElementById('hitbox-legend').style.display = esJuego ? 'flex'  : 'none';

  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', i === idx)
  );
}

const nav = document.getElementById('tabs');
CASOS.forEach((c, i) => {
  const btn = document.createElement('button');
  btn.className   = 'tab';
  btn.textContent = c.sector;
  btn.onclick     = () => loadCaso(i);
  nav.appendChild(btn);
});


// ═══════════════════════════════════════════════════════════════
//  BUCLE DE ANIMACIÓN
// ═══════════════════════════════════════════════════════════════
let t = 0;

function animate() {
  requestAnimationFrame(animate);
  t += 0.016;
  if (activeCaso && activeObj) activeCaso.animate(activeObj, t);
  controls.update();
  renderer.render(scene, camera);
}

animate();
loadCaso(0);
</script>
</body>
</html>
